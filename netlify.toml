[build]
  command = "cd backend && npm install && cd ../frontend && npm install --include=dev && npm run build"
  publish = "frontend/dist"

[functions]
  directory = "backend"
  external_node_modules = ["express", "mongoose", "cors", "serverless-http", "helmet", "express-rate-limit"]
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/*"
  to = /.netlify/functions/app/api/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200