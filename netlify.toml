[build]
  command = "cd backend && npm install && cd ../frontend && npm ci && npm run build"
  publish = "frontend/dist"

[functions]
  directory = "backend"
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/app/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200